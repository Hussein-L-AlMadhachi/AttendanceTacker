services:
  postgres:
    image: postgres:16-alpine
    container_name: cenusis-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cenusis-network

  db-bootstrap:
    image: postgres:16-alpine
    container_name: cenusis-db-bootstrap
    env_file:
      - .env
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cenusis-network
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        echo "Ensuring database ${DB_NAME} exists..."
        psql -h postgres -U "${DB_USER}" -d postgres -tc \
          "SELECT 1 FROM pg_database WHERE datname = '${DB_NAME}'" | grep -q 1 \
          || psql -h postgres -U "${DB_USER}" -d postgres -c "CREATE DATABASE \"${DB_NAME}\";"
        echo "Database ${DB_NAME} is ready."

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        NODE_ENV: development
    image: cenusis-backend:latest
    container_name: cenusis-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: ${BACKEND_PORT:-3001}
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    networks:
      - cenusis-network

volumes:
  postgres_data:
    driver: local

networks:
  cenusis-network:
    driver: bridge
