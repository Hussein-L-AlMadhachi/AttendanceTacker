# Attendance Tracker — nginx site config (bare metal)
#
# Prerequisites:
#   cd frontend && npm ci && npm run build
#   backend running on 127.0.0.1:3000 (systemd or node)
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/conf.d/attendance-tracker.conf
#   # Edit server_name and root below if needed, then:
#   sudo nginx -t && sudo systemctl reload nginx

upstream attendance_backend {
    server 127.0.0.1:3000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Vite production build output
    root /home/hussein/Projects/gigs/AttendanceTacker/frontend/dist;
    index index.html;

    client_max_body_size 20m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Backend RPC + REST (/api/public, /api/admin, /api/teacher, /api/superadmin, uploads, QR)
    location /api/ {
        proxy_pass http://attendance_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Vite hashed bundles — long cache
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Public static files from dist root
    location ~* \.(svg|ico|png|jpg|jpeg|gif|webp|woff|woff2|ttf|eot|txt)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # React SPA (wouter client routes)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
